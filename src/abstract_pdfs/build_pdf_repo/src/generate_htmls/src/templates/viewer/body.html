<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <a class="crumb" href="{{ site_root }}">← thedailydialectics</a>
      <div class="desc">{{ breadcrumbs|safe }}</div>
      <h1 class="title" id="doc-title"></h1>
      <p class="desc" id="doc-desc"></p>
      <div class="chips" id="keyword-chips"></div>

      <div class="search-wrap">
        <label class="sr-only" for="search-input">Search OCR text</label>
        <input
          id="search-input"
          class="search"
          type="search"
          placeholder="Search OCR text…"
          autocomplete="off"
        />
        <div id="search-status" class="search-status" aria-live="polite"></div>
      </div>
    </div>

    <div class="thumbs" id="thumbs"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="toolbar-group">
        <button id="btn-images" type="button" class="active">Images</button>
        <button id="btn-text" type="button">Text</button>
        <button id="btn-pdf" type="button">PDF</button>
      </div>

      <div class="toolbar-group">
        <button id="btn-first" type="button" aria-label="First page">⏮</button>
        <button id="btn-prev" type="button" aria-label="Previous page">◀</button>
        <span class="page-display" id="page-display">Page 1 / 1</span>
        <button id="btn-next" type="button" aria-label="Next page">▶</button>
        <button id="btn-last" type="button" aria-label="Last page">⏭</button>
      </div>

      <div class="toolbar-group toolbar-group-end">
        <a class="btn-link" href="{{ download_url }}" target="_blank" rel="noopener">Download PDF</a>
      </div>
    </div>

    <div class="viewer-scroll" id="viewer-scroll"></div>
  </main>
</div>
